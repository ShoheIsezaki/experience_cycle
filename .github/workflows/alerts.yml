name: Checklist task alerts

on:
  schedule:
    # 10分間隔。GitHub Actions のスケジュールは数分の遅延があり得るため、
    # 「直近10分の窓」で時刻一致を判定する（下記 window ロジック参照）。
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord task alerts
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set. Skipping alerts."
            exit 0
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] || [ -z "$SUPABASE_URL" ]; then
            echo "Supabase not configured (service role key / URL missing). Skipping alerts."
            exit 0
          fi

          # JST の現在時刻・曜日を求める。
          #   TZ=Asia/Tokyo date +%u は 1=月..7=日 → weekdays(0=月..6=日) に合わせて -1。
          DOW=$(TZ=Asia/Tokyo date +%u)
          WD=$((DOW - 1))
          # 現在時刻を「その日の0時からの分数」に変換して窓判定に使う。
          NOW_H=$(TZ=Asia/Tokyo date +%H)
          NOW_M=$(TZ=Asia/Tokyo date +%M)
          # 10進として扱う（08/09 が8進解釈されないよう 10# を付ける）
          NOW_MIN=$((10#$NOW_H * 60 + 10#$NOW_M))
          # 窓は (now-10分, now]。境界の丸め・実行遅延により
          # ごく稀に取りこぼし／重複が起こり得る点は許容する（10分間隔ポーリングの性質）。
          WIN_START=$((NOW_MIN - 10))

          echo "JST now=${NOW_H}:${NOW_M} (min=$NOW_MIN), weekday=$WD, window=(${WIN_START}, ${NOW_MIN}]"

          # アーカイブ済みを除くタスクを取得（service role key はヘッダのみ・ログに出さない）
          RESPONSE=$(curl -sS \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/rest/v1/checklist_items?archived=eq.false&select=name,url,memo,time,weekdays")

          # weekdays に今日を含み、time が窓内のタスクを抽出。
          #   time は "HH:MM"。空文字（未設定）は対象外。
          #   1行1タスクの TSV（name<TAB>time<TAB>url<TAB>memo）で出力。
          MATCHES=$(printf '%s' "$RESPONSE" | jq -r --argjson wd "$WD" \
            --argjson ws "$WIN_START" --argjson we "$NOW_MIN" '
            .[]?
            | select(.time != null and .time != "")
            | select((.weekdays // []) | index($wd) != null)
            | . as $t
            | ($t.time | split(":")) as $hm
            | (($hm[0]|tonumber) * 60 + ($hm[1]|tonumber)) as $min
            | select($min > $ws and $min <= $we)
            | [$t.name, $t.time, ($t.url // ""), ($t.memo // "")]
            | @tsv
          ' 2>/dev/null || echo "")

          if [ -z "$MATCHES" ]; then
            echo "No tasks due in this window. Nothing to send."
            exit 0
          fi

          APP_URL="https://shoheisezaki.github.io/experience_cycle/#/check"

          # 各タスクにつき1メッセージ送信
          printf '%s\n' "$MATCHES" | while IFS=$'\t' read -r NAME TIME URL MEMO; do
            [ -z "$NAME" ] && continue
            MSG="🔔 **「${NAME}」の時間です！**（${TIME}）"
            if [ -n "$MEMO" ]; then
              # メモは先頭200字まで
              SHORT_MEMO=$(printf '%s' "$MEMO" | cut -c1-200)
              MSG="${MSG}"$'\n'"${SHORT_MEMO}"
            fi
            if [ -n "$URL" ]; then
              MSG="${MSG}"$'\n'"🔗 ${URL}"
            fi
            MSG="${MSG}"$'\n'"📱 アプリ: ${APP_URL}"

            PAYLOAD=$(jq -n --arg content "$MSG" '{content: $content}')
            HTTP_CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
              -H 'Content-Type: application/json' \
              -X POST \
              -d "$PAYLOAD" \
              "$DISCORD_WEBHOOK_URL")
            echo "Sent alert for '${NAME}' -> HTTP $HTTP_CODE"
          done
